version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
      - ./docker-data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    ports:
      - "${API_PORT}:8000"
    volumes:
      - ./apps/api/app:/app/app
      - ./data:/app/data
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=INFO"]
    volumes:
      - ./apps/api/app:/app/app
      - ./data:/app/data
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./apps/web
    env_file:
      - ./apps/web/.env.local.example
    ports:
      - "${WEB_PORT}:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api
